# Test compose file for xdebug-config functionality
# Usage:
#   docker compose -f docker-compose.test-xdebug.yml up -d
#   docker compose -f docker-compose.test-xdebug.yml exec dev bash
#   # Inside dev container:
#   xdebug-config enable
#   xdebug-config disable

services:
  php:
    image: nfqlt/php83-fpm:amd64
    environment:
      - NFQ_ENABLE_PHP_MODULES=xdebug

  dev:
    image: nfqlt/php83-dev:amd64
    command: sleep infinity
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - NFQ_ENABLE_PHP_MODULES=xdebug
