apache24:
  stage: level_2
  before_script:
  - echo $nfqhub_ip_os docker.nfq.lt >> /etc/hosts
  - docker login -u $dockerhub_user -p $dockerhub_token
  - docker login -u $nfqhub_user -p $nfqhub_token https://docker.nfq.lt
  script: cd apache24 && make all-amd64 && make push-manifest && make publish && make
    clean
  needs:
  - job: enable-cascade
    optional: true
  - apache24_arm64
  tags:
