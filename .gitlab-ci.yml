include: _tools/gitlab/*/*.yml

# Add the environment variable globally right here at the top
variables:
  DOCKER_API_VERSION: "1.44"

# Control pipeline creation to avoid detached MR pipeline issues
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never  # Avoid duplicate pipelines for MR branches
    - if: '$CI_COMMIT_BRANCH'

stages:
  - validate
  - level_1
  - level_2
  - level_3
  - level_4
  - level_5

default:
  image: nfqlt/aws-docker-tools
  tags: [nfq_ip]
  before_script:
    # 1. Bump the downloaded CLI version to 25.0.3 (which supports API 1.44)
    - curl -fsSL https://download.docker.com/linux/static/stable/x86_64/docker-25.0.3.tgz -o /tmp/docker.tgz
    - tar xz -C /tmp -f /tmp/docker.tgz
    - sudo mv -f /tmp/docker/docker /usr/bin/docker
    
    # 2. Fix the insecure password warnings by piping the token into --password-stdin
    - echo "$dockerhub_token" | docker login -u $dockerhub_user --password-stdin
    - echo "$nfqhub_token" | docker login -u $nfqhub_user --password-stdin https://docker.nfq.lt
  after_script:
    - docker logout
    - docker logout docker.nfq.lt
  retry: 2

# Validate that generated configs are up to date
validate:generated-configs:
  stage: validate
  image: alpine:latest
  before_script:
    - apk add --no-cache bash git graphviz
  script:
    - bash _tools/validate-generated.sh
  after_script: []  # Override default after_script (no docker needed)
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "master"'
  tags: [nfq_ip]
