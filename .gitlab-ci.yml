include: _tools/gitlab/*/*.yml

# Pipeline runs automatically only on:
# - Merge requests (MR pipelines)
# - Scheduled pipelines
# - Manual "Run pipeline" from web UI (BUILD_MODE variable controls behavior)
# Push to master branch requires manual trigger
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

variables:
  BUILD_MODE:
    value: "automatic"
    description: "Build mode: 'automatic' runs all jobs, 'manual' requires manual trigger for each job"
    options:
      - "automatic"
      - "manual"

stages:
  - validate
  - level_1
  - level_2
  - level_3
  - level_4
  - level_5

# Default: All jobs cascade automatically (like before)
# For selective builds: Run Pipeline -> Add variable MANUAL=true -> Run
# With MANUAL=true, only _arm64 entry points are manual, manifest jobs auto-follow

default:
  image: nfqlt/aws-docker-tools
  tags: [nfq_ip]
  before_script:
    - echo "$dockerhub_token" | docker login -u $dockerhub_user --password-stdin
    - echo "$nfqhub_token" | docker login -u $nfqhub_user --password-stdin https://docker.nfq.lt
  after_script:
    - docker logout
    - docker logout docker.nfq.lt
  retry:
    max: 2
    when:
      - runner_system_failure
      - script_failure
      - unknown_failure
      - stuck_or_timeout_failure

# Validate that generated configs are up to date
validate:generated-configs:
  stage: validate
  image: alpine:latest
  before_script:
    - apk add --no-cache bash git graphviz
  script:
    - bash _tools/validate-generated.sh
  after_script: []  # Override default after_script (no docker needed)
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == "master"'
  tags: [nfq_ip]
